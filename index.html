<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldStock - Farm Equipment Rental System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div>
    <h1>FieldStock</h1>
    <p>Farm Equipment Rental Management System</p>
  </div>
  <div class="topbar-actions">
    <span id="modeText">Connecting...</span>
    <div class="tabs">
      <button class="tab-btn active" id="tabCatalog" onclick="switchView('catalog')">Catalog</button>
      <button class="tab-btn" id="tabAdmin" onclick="switchView('admin')">Admin</button>
    </div>
  </div>
</div>

<!-- ================= CATALOG VIEW ================= -->
<div id="viewCatalog" class="view active">
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by name, brand or model...">
    <select class="filter" id="categoryFilter"><option value="">All Categories</option></select>
    <select class="filter" id="availFilter">
      <option value="">All Availability</option>
      <option value="available">Available Now</option>
      <option value="rented">Fully Rented Out</option>
    </select>
  </div>

  <main>
    <div class="section-heading">
      <h2>Equipment List</h2>
      <span id="resultCount"></span>
    </div>
    <div class="grid" id="equipmentGrid"></div>
  </main>
</div>

<!-- ================= ADMIN VIEW ================= -->
<div id="viewAdmin" class="view">
  <main>
    <div class="admin-bar">
      <h2>Inventory Management (Admin)</h2>
      <button class="btn btn-blue" onclick="openEquipmentForm()">+ Add Equipment</button>
    </div>

    <div class="controls" style="margin:0 0 12px; padding:0;">
      <input type="text" id="adminSearch" placeholder="Search equipment...">
    </div>

    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Photo</th><th>ID</th><th>Name</th><th>Category</th><th>Rent/Day</th>
            <th>Total</th><th>Available</th><th>Rented</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ================= DETAIL MODAL ================= -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detailOverlay')">X</button>
    <div class="detail-grid" id="detailContent"></div>
  </div>
</div>

<!-- ================= EQUIPMENT FORM MODAL (Admin) ================= -->
<div class="modal-overlay" id="formOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('formOverlay')">X</button>
    <h2 style="padding:20px 20px 0; margin:0;" id="formTitle">Add Equipment</h2>
    <form id="equipmentForm" class="form-grid" onsubmit="handleFormSubmit(event)">
      <input type="hidden" id="f_id">
      <div class="field"><label>Equipment Name *</label><input id="f_name" required placeholder="e.g. Compact Utility Tractor 25HP"></div>
      <div class="field"><label>Category *</label>
        <select id="f_category" required>
          <option>Tractors</option><option>Harvesters</option><option>Tillage Equipment</option>
          <option>Planting Equipment</option><option>Irrigation</option><option>Sprayers</option>
          <option>Trailers & Transport</option><option>Post-Harvest</option><option>Power Tools</option>
        </select>
      </div>
      <div class="field"><label>Brand *</label><input id="f_brand" required placeholder="e.g. AgroMax"></div>
      <div class="field"><label>Model *</label><input id="f_model" required placeholder="e.g. AM-2500X"></div>
      <div class="field"><label>Condition</label>
        <select id="f_condition"><option>Excellent</option><option>Good</option><option>Fair</option></select>
      </div>
      <div class="field"><label>Image URL (Google Drive link)</label><input id="f_image" placeholder="https://drive.google.com/uc?id=..."></div>
      <div class="field full"><label>Description</label><textarea id="f_description" placeholder="Short description..."></textarea></div>
      <div class="field full"><label>Features (comma separated)</label><input id="f_features" placeholder="4WD, Power steering, LED lights"></div>
      <div class="field full"><label>Specifications (key:value, comma separated)</label><input id="f_specs" placeholder="Engine:25HP, Fuel Tank:45L, Weight:1200kg"></div>
      <div class="field"><label>Rent / Day (Rs) *</label><input id="f_rent" type="number" min="0" required></div>
      <div class="field"><label>Security Deposit (Rs) *</label><input id="f_deposit" type="number" min="0" required></div>
      <div class="field"><label>Total Quantity *</label><input id="f_total" type="number" min="0" required onchange="syncAvailMax()"></div>
      <div class="field"><label>Available Quantity *</label><input id="f_avail" type="number" min="0" required></div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('formOverlay')">Cancel</button>
        <button type="submit" class="btn btn-blue" id="formSubmitBtn">Save Equipment</button>
      </div>
    </form>
  </div>
</div>

<!-- ================= RENT MODAL ================= -->
<div class="modal-overlay" id="rentOverlay">
  <div class="modal" style="max-width:420px;">
    <button class="modal-close" onclick="closeModal('rentOverlay')">X</button>
    <h2 style="padding:20px 20px 0; margin:0;">Rent Equipment</h2>
    <form id="rentForm" class="form-grid single" onsubmit="submitRent(event)">
      <input type="hidden" id="r_id">
      <div class="field"><label>Renting:</label><div id="r_equipName" style="font-weight:bold;"></div></div>
      <div class="field"><label>Your Name *</label><input id="r_name" required></div>
      <div class="field"><label>Phone Number *</label><input id="r_phone" required></div>
      <div class="field"><label>Quantity *</label><input id="r_qty" type="number" min="1" value="1" required></div>
      <div class="field"><label>Number of Days *</label><input id="r_days" type="number" min="1" value="1" required></div>
      <div class="field"><label>Estimated Total</label><div id="r_total" style="font-weight:bold;font-size:16px;"></div></div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('rentOverlay')">Cancel</button>
        <button type="submit" class="btn btn-blue">Confirm Rental</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<footer>
  FieldStock - Farm Equipment Rental Management System (College Project)
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
